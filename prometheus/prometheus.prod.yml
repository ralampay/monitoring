global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: runbunny-api
    scheme: https
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /tmp/prometheus-app-key
    static_configs:
      - targets:
          - api.gorunbunny.com

  - job_name: surveyengine-api
    scheme: https
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /tmp/prometheus-app-key
    static_configs:
      - targets:
          - surveyengineapi-dev.abctechph.com
